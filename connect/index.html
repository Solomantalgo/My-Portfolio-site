<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect with Solo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #39ff14;
    --green-dim: #1a7a08;
    --green-glow: rgba(57,255,20,0.35);
    --dark: #060b06;
    --dark2: #0d150d;
    --card-bg: rgba(10,20,10,0.85);
    --text: #e8ffe8;
    --text-dim: #7aaa7a;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--dark);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
  }

  /* Animated circuit background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(57,255,20,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPan 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridPan {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  /* Radial glow center */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(57,255,20,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 20px;
    gap: 0;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 6px;
    animation: fadeDown 0.7s ease both;
  }

  .tag {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  .code-icon {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    color: var(--green);
    text-shadow: 0 0 20px var(--green-glow);
    margin-bottom: 4px;
    display: block;
  }

  .name {
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px, 5vw, 30px);
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .name span { color: var(--green); }

  .role {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 5px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 0;
  }

  /* Divider */
  .divider {
    width: 100%;
    max-width: 360px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    margin: 14px 0;
    animation: fadeIn 1s ease 0.4s both;
  }

  /* WhatsApp — HERO button */
  .btn-wa {
    position: relative;
    width: 100%;
    max-width: 360px;
    background: var(--green);
    color: #040f04;
    border: none;
    border-radius: 12px;
    padding: 15px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    overflow: hidden;
    animation: fadeUp 0.6s ease 0.5s both;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(57,255,20,0.4), 0 4px 20px rgba(0,0,0,0.5);
    margin-bottom: 10px;
  }

  .btn-wa::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  }

  .btn-wa:hover {
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 0 50px rgba(57,255,20,0.6), 0 8px 30px rgba(0,0,0,0.6);
  }

  .btn-wa:active { transform: scale(0.98); }

  /* Pulse ring on WA button */
  .btn-wa::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 14px;
    border: 2px solid var(--green);
    animation: pulse-ring 2s ease infinite;
    pointer-events: none;
  }

  @keyframes pulse-ring {
    0% { opacity: 1; transform: scale(1); }
    70% { opacity: 0; transform: scale(1.04); }
    100% { opacity: 0; transform: scale(1.04); }
  }

  .btn-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .btn-wa .btn-icon svg { fill: #040f04; }

  .btn-text { flex: 1; }
  .btn-label {
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    font-weight: 700;
    display: block;
    margin-bottom: 2px;
  }
  .btn-sub {
    font-size: 12px;
    font-weight: 400;
    opacity: 0.7;
    letter-spacing: 1px;
  }

  .btn-arrow {
    font-size: 20px;
    font-weight: 700;
    opacity: 0.6;
  }

  /* Secondary buttons */
  .btn-secondary {
    width: 100%;
    max-width: 360px;
    background: var(--card-bg);
    border: 1px solid rgba(57,255,20,0.25);
    border-radius: 12px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
    margin-bottom: 8px;
    backdrop-filter: blur(10px);
  }

  .btn-secondary:hover {
    border-color: var(--green);
    background: rgba(57,255,20,0.06);
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(57,255,20,0.15);
  }

  .btn-secondary .btn-icon {
    background: rgba(57,255,20,0.08);
    border: 1px solid rgba(57,255,20,0.2);
  }

  .btn-secondary .btn-icon svg { fill: var(--green); }

  .btn-secondary:nth-of-type(2) { animation: fadeUp 0.6s ease 0.65s both; }
  .btn-secondary:nth-of-type(3) { animation: fadeUp 0.6s ease 0.75s both; }
  .btn-secondary:nth-of-type(4) { animation: fadeUp 0.6s ease 0.85s both; }

  /* Save contact button - special style */
  .btn-save {
    width: 100%;
    max-width: 360px;
    background: transparent;
    border: 1px dashed rgba(57,255,20,0.35);
    border-radius: 12px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    color: var(--green);
    transition: all 0.2s;
    margin-top: 2px;
    animation: fadeUp 0.6s ease 0.95s both;
  }

  .btn-save:hover {
    background: rgba(57,255,20,0.05);
    border-color: var(--green);
    box-shadow: 0 0 16px rgba(57,255,20,0.1);
    transform: translateY(-2px);
  }

  .btn-save .save-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .save-label {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    display: block;
  }

  .save-sub {
    font-size: 11px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* Footer */
  .footer {
    margin-top: 14px;
    text-align: center;
    animation: fadeIn 1s ease 1.1s both;
  }

  .footer p {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .footer a {
    color: var(--green);
    text-decoration: none;
    opacity: 0.8;
  }

  /* Scan confirmed feedback */
  .scan-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(57,255,20,0.08);
    border: 1px solid rgba(57,255,20,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--green);
    letter-spacing: 2px;
    margin-bottom: 10px;
    animation: fadeDown 0.7s ease 0.2s both;
  }

  .scan-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 1.2s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>
